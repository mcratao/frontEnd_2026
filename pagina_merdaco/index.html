<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title> Caixa livre </title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
.topo{
background: #ffc107;    
text-align: center;
font-size: 43px;
font-weight: bold;
border: 4px solid #000ead;
}
.painel {
background: #fff;
padding: 10px;
margin-bottom: 10px;
border: 4px solid #000ead;
}
.total{
font-size: 34px;
text-align: right;
font-weight: bold;
text-color: #000ead;
}
</style>


</head>
<body class="bg-primary bg-gradient">
<div class="container mt-3">
<div class="topo"> CAIXA LIVRE </div>

<div class="row mt-3">

<div class="col-md-5">
<h3 class="text-white">
<span class="badge text-bg-primary">Sua compra</span></h3>
<ul id="lista" class="list-group lista"> </ul>
</div>

<div class="col-md-7">
<div class="painel total">
<span id="total" style="text-color: #000ead;"> 0,00</span>
</div>

<div class="painel">
<label> Codigo de Barras </label>
<input type="number" id="cod" class="from-control">
</div>

<div class="painel">
<label> Quantidade </label>
<input type="number" id="qtd" class="from-control" value="1">
</div>

<button class="btn btn-success w-100" onclick="addProduto()">
adiciona Produto
</button>
</div>

</div>
</div>


<script src="site.js"></script>
</body>
</html>
